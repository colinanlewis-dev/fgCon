<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orders</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }
    header { background: #1a1a2e; color: white; padding: 1.2rem 2rem; }
    header a { color: #a5b4fc; font-size: .85rem; text-decoration: none; display: block; margin-bottom: .4rem; }
    header h1 { font-size: 1.4rem; font-weight: 600; }
    .container { max-width: 960px; margin: 2rem auto; padding: 0 1rem; display: grid; grid-template-columns: 1fr 320px; gap: 1.5rem; align-items: start; }
    @media (max-width: 700px) { .container { grid-template-columns: 1fr; } }

    .card { background: white; border-radius: 10px; padding: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 1.5rem; }
    .card h2 { font-size: .75rem; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 1rem; }

    .event-banner { background: #eef2ff; border: 1px solid #c7d2fe; border-radius: 8px; padding: .75rem 1rem; display: flex; align-items: center; justify-content: space-between; }
    .event-banner .ev-name { font-weight: 600; font-size: .95rem; }
    .event-banner .ev-date { font-size: .8rem; color: #666; }
    .no-event { text-align: center; color: #aaa; padding: 3rem 1rem; font-size: .95rem; }

    /* Type tiles */
    .type-tiles { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; margin-bottom: 1rem; }
    .type-tile { background: white; border: 2px solid #e5e7eb; border-radius: 10px; padding: .8rem .5rem .6rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: .2rem; transition: all .15s; position: relative; }
    .type-tile:hover { border-color: #d1d5db; transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,.07); }
    .type-tile .tile-icon { font-size: 1.5rem; line-height: 1; }
    .type-tile .tile-name { font-size: .78rem; font-weight: 700; color: #374151; text-transform: uppercase; letter-spacing: .05em; }
    .type-tile .tile-meta { font-size: .7rem; color: #9ca3af; }
    .type-tile .tile-badge { position: absolute; top: .35rem; right: .45rem; background: #4f46e5; color: white; border-radius: 99px; font-size: .65rem; font-weight: 700; padding: .1rem .38rem; min-width: 1.1rem; text-align: center; line-height: 1.4; }
    .type-tile.t-active { color: white; }
    .type-tile.t-cooked { border-color: #ea580c; background: #ea580c; }
    .type-tile.t-cooked .tile-name { color: white; }
    .type-tile.t-cooked .tile-meta { color: rgba(255,255,255,.75); }
    .type-tile.t-fresh  { border-color: #16a34a; background: #16a34a; }
    .type-tile.t-fresh .tile-name { color: white; }
    .type-tile.t-fresh .tile-meta { color: rgba(255,255,255,.75); }
    .type-tile.t-side   { border-color: #7c3aed; background: #7c3aed; }
    .type-tile.t-side .tile-name { color: white; }
    .type-tile.t-side .tile-meta { color: rgba(255,255,255,.75); }
    .type-tile.t-drink  { border-color: #0284c7; background: #0284c7; }
    .type-tile.t-drink .tile-name { color: white; }
    .type-tile.t-drink .tile-meta { color: rgba(255,255,255,.75); }
    .type-tile.t-cooked .tile-badge, .type-tile.t-fresh .tile-badge,
    .type-tile.t-side .tile-badge, .type-tile.t-drink .tile-badge { background: white; color: #374151; }
    /* Item grid */
    .item-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; }
    .item-card { background: #fafafa; border: 1.5px solid #f0f0f0; border-radius: 8px; padding: .6rem .7rem; display: flex; flex-direction: column; gap: .35rem; transition: border-color .1s; }
    .item-card.in-cart { background: #eef2ff; border-color: #a5b4fc; }
    .item-card .ic-name { font-size: .85rem; font-weight: 600; color: #1f2937; line-height: 1.2; }
    .item-card .ic-price { font-size: .78rem; color: #6b7280; }
    .item-card .ic-ctrl { display: flex; align-items: center; justify-content: space-between; }
    .qty-btn { width: 28px; height: 28px; border: 1px solid #ddd; border-radius: 6px; background: white; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; flex-shrink: 0; }
    .qty-btn:hover { background: #f0f0f0; }
    .qty-num { min-width: 24px; text-align: center; font-size: .9rem; font-weight: 700; }

    /* Cart */
    .cart-sticky { position: sticky; top: 1.5rem; }
    .cart-items { margin-bottom: 1rem; min-height: 60px; }
    .cart-row { display: flex; justify-content: space-between; align-items: center; padding: .4rem 0; border-bottom: 1px solid #f5f5f5; font-size: .88rem; }
    .cart-row:last-child { border-bottom: none; }
    .cart-empty { color: #bbb; font-size: .85rem; text-align: center; padding: 1rem 0; }
    .cart-total { display: flex; justify-content: space-between; font-weight: 700; padding-top: .75rem; border-top: 2px solid #f0f0f0; margin-bottom: 1rem; }
    .btn-place { width: 100%; padding: .7rem; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-place:hover { background: #4338ca; }
    .btn-place:disabled { background: #c7c7d9; cursor: not-allowed; }
    .vip-section { margin-bottom: 1rem; padding: .75rem; background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; display: flex; flex-direction: column; gap: .5rem; }
    .vip-row { display: flex; align-items: center; gap: .6rem; font-size: .88rem; font-weight: 600; color: #92400e; }
    .toggle { appearance: none; width: 36px; height: 20px; background: #ddd; border-radius: 99px; cursor: pointer; transition: background .2s; position: relative; flex-shrink: 0; }
    .toggle:checked { background: #d97706; }
    .toggle::after { content: ''; position: absolute; width: 14px; height: 14px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: left .2s; }
    .toggle:checked::after { left: 19px; }
    .vip-note-wrap { display: none; }
    .vip-note-wrap input { font-size: .85rem; padding: .4rem .6rem; border-color: #fde68a; }
    .badge-vip { background: #fef3c7; color: #92400e; display: inline-block; padding: .15rem .5rem; border-radius: 99px; font-size: .72rem; font-weight: 700; margin-left: .4rem; }
    .badge-combo { background: #e0f2fe; color: #075985; display: inline-block; padding: .15rem .5rem; border-radius: 99px; font-size: .72rem; font-weight: 700; margin-left: .4rem; }
    .payment-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; font-size: .88rem; font-weight: 600; color: #374151; }
    .payment-row select { padding: .35rem .6rem; border: 1px solid #ddd; border-radius: 6px; font-size: .88rem; cursor: pointer; }
    .combo-banner { margin-bottom: 1rem; padding: .6rem .85rem; background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 8px; font-size: .82rem; color: #075985; display: flex; justify-content: space-between; align-items: center; }
    .combo-banner .cb-label { font-weight: 600; }
    .combo-banner .cb-saving { font-weight: 700; color: #0284c7; }
    .half-price-bar { display: flex; align-items: center; justify-content: space-between; background: #f0fdf4; border: 1px solid #86efac; border-radius: 8px; padding: .65rem .85rem; margin-bottom: 1rem; }
    .half-price-bar .hp-label { font-size: .85rem; font-weight: 600; color: #166534; display: flex; align-items: center; gap: .5rem; }
    .half-price-bar .hp-desc { font-size: .75rem; color: #4ade80; margin-top: .1rem; }
    .toggle-green:checked { background: #16a34a; }
    .price-half { color: #16a34a; font-weight: 600; }
    .price-orig { color: #bbb; text-decoration: line-through; margin-right: .25rem; }

    /* Orders list */
    .order-card { border: 1px solid #f0f0f0; border-radius: 8px; padding: 1rem; margin-bottom: .75rem; }
    .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: .5rem; }
    .order-id { font-weight: 600; font-size: .9rem; }
    .order-time { font-size: .75rem; color: #999; }
    .order-lines { font-size: .85rem; color: #555; }
    .order-line { display: flex; justify-content: space-between; padding: .2rem 0; }
    .order-footer { display: flex; justify-content: space-between; align-items: center; margin-top: .6rem; border-top: 1px solid #f5f5f5; padding-top: .6rem; }
    .order-total { font-weight: 700; font-size: .95rem; }
    .btn-del { background: transparent; color: #dc2626; border: 1px solid #fca5a5; font-size: .78rem; padding: .3rem .65rem; border-radius: 6px; cursor: pointer; }
    .btn-del:hover { background: #fef2f2; }

    .empty { text-align: center; color: #aaa; padding: 2rem; font-size: .9rem; }
    #toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #1a1a2e; color: white; padding: .7rem 1.2rem; border-radius: 8px; font-size: .85rem; opacity: 0; transition: opacity .3s; pointer-events: none; }
    #toast.show { opacity: 1; }
    #no-event { text-align: center; color: #aaa; padding: 2rem; font-size: .9rem; }
  </style>
</head>
<body>
<header>
  <a href="/">&#8592; Home</a>
  <h1>Orders</h1>
</header>

<div style="max-width:960px;margin:1.5rem auto;padding:0 1rem">
  <div class="card" style="margin-bottom:0" id="eventBannerCard">
    <h2>Active Event</h2>
    <div id="eventBanner"></div>
  </div>
</div>

<div class="container" id="mainContent" style="display:none">
  <!-- Left: menu + past orders -->
  <div>
    <div class="card">
      <div class="half-price-bar">
        <div>
          <div class="hp-label">&#x1F4B2; Fresh Items 1/2 Price</div>
          <div class="hp-desc">Reduces all Fresh and Cooked menu items to 50% off</div>
        </div>
        <input class="toggle toggle-green" type="checkbox" id="halfPriceToggle" onchange="onHalfPriceToggle()" />
      </div>
      <div class="type-tiles" id="typeTiles"></div>
      <div id="itemPanel"></div>
    </div>
    <div class="card">
      <h2>Popular Items</h2>
      <div id="popularList"></div>
    </div>
  </div>

  <!-- Right: cart -->
  <div class="cart-sticky">
    <div class="card">
      <h2>Current Order</h2>
      <div class="cart-items" id="cartItems"><p class="cart-empty">No items added yet.</p></div>
      <div class="cart-total"><span>Total</span><span id="cartTotal">$0.00</span></div>
      <div class="vip-section">
        <div class="vip-row">
          <input class="toggle" type="checkbox" id="vipToggle" onchange="onVipToggle()" />
          <label for="vipToggle">VIP Order (complimentary)</label>
        </div>
        <div class="vip-note-wrap" id="vipNoteWrap">
          <input type="text" id="vipNote" placeholder="VIP name or note (optional)" />
        </div>
      </div>
      <div class="combo-banner" id="comboBanner" style="display:none">
        <span class="cb-label">&#x1F371; Combo applied</span>
        <span class="cb-saving" id="comboSaving"></span>
      </div>
      <div class="payment-row">
        <label for="paymentMethod">Payment</label>
        <select id="paymentMethod">
          <option value="Cash">Cash</option>
          <option value="Venmo">Venmo</option>
        </select>
      </div>
      <button class="btn-place" id="placeBtn" onclick="placeOrder()" disabled>Place Order</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  let cart = {};
  let menuData = [];
  let comboData = [];
  let activeCombo = null;
  let selectedEventId = null;

  function isHalfPrice() { return document.getElementById('halfPriceToggle').checked; }

  function isDiscounted(item) {
    const t = item.itemType.toLowerCase();
    return isHalfPrice() && (t === 'fresh' || t === 'cooked');
  }

  function effectivePrice(item) {
    return isDiscounted(item) ? item.itemCost / 2 : item.itemCost;
  }

  async function init() {
    const res = await fetch('/api/events/active');
    const event = await res.json();
    const banner = document.getElementById('eventBanner');
    if (!event) {
      banner.innerHTML = '<p class="no-event">No active event. Set one active in Event Manager.</p>';
      return;
    }
    selectedEventId = event.id;
    banner.innerHTML = `<div class="event-banner">
      <span class="ev-name">${esc(event.eventName || 'Unnamed Event')}</span>
      <span class="ev-date">${formatDate(event.eventDate)}${event.eventSize ? ' &mdash; ' + esc(event.eventSize) + ' guests' : ''}</span>
    </div>`;
    document.getElementById('mainContent').style.display = '';
    await Promise.all([loadMenu(), loadOrders(), loadCombos()]);
    renderCart();
  }

  const TYPE_ORDER  = ['Cooked', 'Fresh', 'Side', 'Drink'];
  const TYPE_CONFIG = {
    Cooked: { icon: '&#x1F373;', cls: 't-cooked' },
    Fresh:  { icon: '&#x1F957;', cls: 't-fresh'  },
    Side:   { icon: '&#x1F35F;', cls: 't-side'   },
    Drink:  { icon: '&#x1F964;', cls: 't-drink'  },
  };
  let activeType = null;

  function normalizeType(t) {
    return t.charAt(0).toUpperCase() + t.slice(1).toLowerCase();
  }

  async function loadMenu() {
    const res = await fetch('/api/menu');
    menuData = (await res.json())
      .filter(m => m.isAvailable)
      .map(m => ({ ...m, itemType: normalizeType(m.itemType) }));
    renderMenu();
  }

  function renderMenu() {
    const groups = {};
    menuData.forEach(m => { (groups[m.itemType] = groups[m.itemType] || []).push(m); });

    // --- Tiles ---
    document.getElementById('typeTiles').innerHTML = TYPE_ORDER
      .filter(t => groups[t])
      .map(t => {
        const cfg = TYPE_CONFIG[t];
        const inCart = menuData.filter(m => m.itemType === t && cart[m.id]).reduce((s, m) => s + cart[m.id].qty, 0);
        const isActive = activeType === t;
        return `<button class="type-tile${isActive ? ' ' + cfg.cls : ''}" onclick="selectType('${t}')">
          <span class="tile-icon">${cfg.icon}</span>
          <span class="tile-name">${t}</span>
          <span class="tile-meta">${groups[t].length} items</span>
          ${inCart ? `<span class="tile-badge">${inCart}</span>` : ''}
        </button>`;
      }).join('');

    // --- Item panel ---
    const panel = document.getElementById('itemPanel');
    if (!activeType || !groups[activeType]) { panel.innerHTML = ''; return; }
    panel.innerHTML = `<div class="item-grid">${
      groups[activeType].map(m => {
        const ep = effectivePrice(m);
        const qty = cart[m.id] ? cart[m.id].qty : 0;
        const priceHtml = isDiscounted(m)
          ? `<span class="price-orig">$${m.itemCost.toFixed(2)}</span> <span class="price-half">$${ep.toFixed(2)}</span>`
          : `$${ep.toFixed(2)}`;
        return `<div class="item-card${qty > 0 ? ' in-cart' : ''}" id="card-${m.id}">
          <div class="ic-name">${esc(m.itemName)}</div>
          <div class="ic-price" id="price-${m.id}">${priceHtml}</div>
          <div class="ic-ctrl">
            <button class="qty-btn" onclick="adjustQty(${m.id}, -1)">&#8722;</button>
            <span class="qty-num" id="qty-${m.id}">${qty}</span>
            <button class="qty-btn" onclick="adjustQty(${m.id}, 1)">+</button>
          </div>
        </div>`;
      }).join('')
    }</div>`;
  }

  function selectType(type) {
    activeType = activeType === type ? null : type;
    renderMenu();
  }

  function onHalfPriceToggle() {
    menuData.forEach(m => { if (cart[m.id]) cart[m.id].price = effectivePrice(m); });
    renderMenu();
    renderCart();
  }

  function adjustQty(id, delta) {
    const item = menuData.find(m => m.id === id);
    if (!item) return;
    const current = cart[id] ? cart[id].qty : 0;
    const next = Math.max(0, current + delta);
    if (next === 0) { delete cart[id]; }
    else { cart[id] = { name: item.itemName, price: effectivePrice(item), qty: next, type: item.itemType }; }
    // Update qty display and card highlight in-place
    const qtyEl = document.getElementById('qty-' + id);
    if (qtyEl) qtyEl.textContent = next;
    const cardEl = document.getElementById('card-' + id);
    if (cardEl) cardEl.classList.toggle('in-cart', next > 0);
    const popQtyEl = document.getElementById('pop-qty-' + id);
    if (popQtyEl) popQtyEl.textContent = next;
    const popCardEl = document.getElementById('pop-card-' + id);
    if (popCardEl) popCardEl.classList.toggle('in-cart', next > 0);
    // Refresh tile badges
    renderMenu();
    renderCart();
  }

  async function loadCombos() {
    const res = await fetch('/api/combos');
    comboData = await res.json();
  }

  function cartItemsByType(...types) {
    return Object.entries(cart)
      .filter(([, item]) => types.some(t => item.type.toLowerCase() === t.toLowerCase()))
      .map(([id, item]) => ({ id: parseInt(id), ...item }));
  }

  function autoApplyCombo() {
    if (!comboData.length) { activeCombo = null; return; }

    // Track remaining units available for combo assignment
    const remaining = {};
    Object.entries(cart).forEach(([id, item]) => {
      remaining[parseInt(id)] = item.qty;
    });

    // Cumulative price delta per item across all applied combos
    const deltas = {};
    let totalSavings = 0;
    let comboCount = 0;

    let keepTrying = true;
    while (keepTrying) {
      keepTrying = false;

      const avail = (id) => remaining[id] > 0;
      const mains  = cartItemsByType('Cooked', 'Fresh').filter(i => avail(i.id));
      const drinks = cartItemsByType('Drink').filter(i => avail(i.id));
      const sides  = cartItemsByType('Side', 'Fresh').filter(i => avail(i.id));
      if (!mains.length || !drinks.length || !sides.length) break;

      let best = null, bestSavings = 0;
      for (const combo of comboData) {
        const pool0 = parseFloat(combo.maxDrinkCost) + parseFloat(combo.maxSideCost);
        const cp    = parseFloat(combo.comboPrice);
        for (const main of mains) {
          for (const drink of drinks) {
            for (const side of sides) {
              if (main.id === drink.id || main.id === side.id || drink.id === side.id) continue;
              let pool = pool0;
              const drinkSaved = Math.min(drink.price, pool); pool -= drinkSaved;
              const sideSaved  = Math.min(side.price, pool);
              const savings    = drinkSaved + sideSaved - cp;
              if (savings > bestSavings) {
                bestSavings = savings;
                best = { combo, main, drink, side, drinkSaved, sideSaved, savings, cp };
              }
            }
          }
        }
      }

      if (best) {
        const { main, drink, side, drinkSaved, sideSaved, cp } = best;
        remaining[main.id]--;
        remaining[drink.id]--;
        remaining[side.id]--;
        deltas[main.id]  = (deltas[main.id]  || 0) + cp;
        deltas[drink.id] = (deltas[drink.id] || 0) - drinkSaved;
        deltas[side.id]  = (deltas[side.id]  || 0) - sideSaved;
        totalSavings += best.savings;
        comboCount++;
        keepTrying = true;
      }
    }

    if (!comboCount) { activeCombo = null; return; }

    // Blend per-unit price: spread total delta evenly across all units of that item
    const prices = {};
    for (const [id, delta] of Object.entries(deltas)) {
      const intId = parseInt(id);
      prices[intId] = Math.max(0, cart[intId].price + delta / cart[intId].qty);
    }

    activeCombo = { count: comboCount, savings: totalSavings, prices };
  }

  function isVip() { return document.getElementById('vipToggle').checked; }

  function onVipToggle() {
    document.getElementById('vipNoteWrap').style.display = isVip() ? 'block' : 'none';
    renderCart();
  }

  function renderCart() {
    const entries = Object.entries(cart);
    const cartEl = document.getElementById('cartItems');
    if (!entries.length) {
      cartEl.innerHTML = '<p class="cart-empty">No items added yet.</p>';
      document.getElementById('cartTotal').textContent = '$0.00';
      document.getElementById('placeBtn').disabled = true;
      return;
    }
    const vip = isVip();
    let total = 0;
    cartEl.innerHTML = entries.map(([id, item]) => {
      const line = item.price * item.qty;
      if (!vip) total += line;
      return `<div class="cart-row">
        <span>${esc(item.name)} x${item.qty}</span>
        <span>${vip ? '<s style="color:#bbb">$' + line.toFixed(2) + '</s> $0.00' : '$' + line.toFixed(2)}</span>
      </div>`;
    }).join('');
    autoApplyCombo();
    const banner = document.getElementById('comboBanner');
    if (!vip && activeCombo) {
      const label = document.querySelector('#comboBanner .cb-label');
      label.textContent = `🍱 ${activeCombo.count > 1 ? activeCombo.count + ' Combos' : 'Combo'} applied`;
      document.getElementById('comboSaving').textContent = `Saved $${activeCombo.savings.toFixed(2)}`;
      banner.style.display = 'flex';
      total = Object.entries(cart).reduce((sum, [id, item]) => {
        const p = activeCombo.prices[parseInt(id)] !== undefined ? activeCombo.prices[parseInt(id)] : item.price;
        return sum + p * item.qty;
      }, 0);
    } else {
      banner.style.display = 'none';
    }
    document.getElementById('cartTotal').textContent = vip ? '$0.00 (VIP)' : '$' + total.toFixed(2);
    document.getElementById('placeBtn').disabled = false;
  }

  async function placeOrder() {
    if (!selectedEventId || !Object.keys(cart).length) return;
    document.getElementById('placeBtn').disabled = true;
    const vip = isVip();
    const adj = (!vip && activeCombo) ? activeCombo : null;
    const items = Object.entries(cart).map(([id, item]) => {
      const intId = parseInt(id);
      const price = (adj && adj.prices[intId] !== undefined) ? adj.prices[intId] : item.price;
      return { menuItemId: intId, quantity: item.qty, priceAtTime: price };
    });
    await fetch('/api/orders', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        eventId: parseInt(selectedEventId),
        items,
        isVIP: vip,
        vipNote: vip ? (document.getElementById('vipNote').value || null) : null,
        usedCombo: !!adj,
        paymentMethod: document.getElementById('paymentMethod').value,
      }),
    });
    cart = {};
    menuData.forEach(m => { const el = document.getElementById('qty-' + m.id); if (el) el.textContent = '0'; });
    document.getElementById('vipToggle').checked = false;
    document.getElementById('vipNote').value = '';
    document.getElementById('vipNoteWrap').style.display = 'none';
    renderCart();
    await loadOrders();
    toast(vip ? 'VIP order placed!' : 'Order placed!');
  }

  async function loadOrders() {
    const res = await fetch(`/api/orders?eventId=${selectedEventId}`);
    const orders = await res.json();
    const el = document.getElementById('popularList');
    if (!orders.length) {
      el.innerHTML = '<p class="empty">No orders yet &mdash; popular items will appear here.</p>';
      return;
    }
    // Aggregate quantities sold across all orders this event
    const totals = {};
    orders.forEach(o => o.items.forEach(i => {
      const id = i.menuItemId;
      if (!totals[id]) totals[id] = { id, name: i.menu?.itemName || 'Item', qty: 0 };
      totals[id].qty += i.quantity;
    }));
    const top5 = Object.values(totals).sort((a, b) => b.qty - a.qty).slice(0, 5);
    el.innerHTML = `<div class="item-grid">${top5.map(t => {
      const m = menuData.find(m => m.id === t.id);
      if (!m) return '';
      const ep = effectivePrice(m);
      const qty = cart[m.id] ? cart[m.id].qty : 0;
      const priceHtml = isDiscounted(m)
        ? `<span class="price-orig">$${m.itemCost.toFixed(2)}</span> <span class="price-half">$${ep.toFixed(2)}</span>`
        : `$${ep.toFixed(2)}`;
      return `<div class="item-card${qty > 0 ? ' in-cart' : ''}" id="pop-card-${m.id}">
        <div class="ic-name">${esc(m.itemName)}</div>
        <div class="ic-price" id="pop-price-${m.id}">${priceHtml}</div>
        <div style="font-size:.7rem;color:#9ca3af">Ordered ${t.qty}x</div>
        <div class="ic-ctrl">
          <button class="qty-btn" onclick="adjustQty(${m.id}, -1)">&#8722;</button>
          <span class="qty-num" id="pop-qty-${m.id}">${qty}</span>
          <button class="qty-btn" onclick="adjustQty(${m.id}, 1)">+</button>
        </div>
      </div>`;
    }).join('')}</div>`;
  }

  async function deleteOrder(id) {
    if (!confirm('Delete this order?')) return;
    await fetch(`/api/orders/${id}`, { method: 'DELETE' });
    toast('Order deleted');
    loadOrders();
  }

  function formatDate(d) {
    if (!d) return '';
    const [y, m, day] = d.split('-');
    return `${m}/${day}/${y}`;
  }

  function formatTime(ts) {
    if (!ts) return '';
    return new Date(ts).toLocaleString();
  }

  function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  init();
</script>
</body>
</html>
